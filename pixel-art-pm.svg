  <rect x="328" y="264" width="38" height="16" fill="#1E3A5F"/>
  <text x="347" y="275" class="mono" font-size="9" fill="#7DD3FC" text-anchor="middle">Claude</text>
  <rect x="372" y="264" width="54" height="16" fill="#1E3A5F"/>
  <text x="399" y="275" class="mono" font-size="9" fill="#7DD3FC" text-anchor="middle">Perplexity</text>
  <rect x="432" y="264" width="40" height="16" fill="#1E3A5F"/>
  <text x="452" y="275" class="mono" font-size="9" fill="#7DD3FC" text-anchor="middle">Cursor</text>

  <!-- Blockchain tags (green) -->
  <rect x="478" y="264" width="32" height="16" fill="#064E3B"/>
  <text x="494" y="275" class="mono" font-size="9" fill="#6EE7B7" text-anchor="middle">Web3</text>
  <rect x="516" y="264" width="64" height="16" fill="#064E3B"/>
  <text x="548" y="275" class="mono" font-size="9" fill="#6EE7B7" text-anchor="middle">Tokenomics</text>
  <rect x="586" y="264" width="28" height="16" fill="#064E3B"/>
  <text x="600" y="275" class="mono" font-size="9" fill="#6EE7B7" text-anchor="middle">DAO</text>

  <!-- Collab tools (gray) -->
  <rect x="32"  y="286" width="40" height="16" fill="#1F2937"/>
  <text x="52"  y="297" class="mono" font-size="9" fill="#D1D5DB" text-anchor="middle">Notion</text>
  <rect x="78"  y="286" width="36" height="16" fill="#1F2937"/>
  <text x="96"  y="297" class="mono" font-size="9" fill="#D1D5DB" text-anchor="middle">Figma</text>
  <rect x="120" y="286" width="46" height="16" fill="#1F2937"/>
  <text x="143" y="297" class="mono" font-size="9" fill="#D1D5DB" text-anchor="middle">GitHub</text>

  <!-- Divider 3 -->
  <rect x="32" y="312" width="736" height="1" fill="#6D28D9"/>

  <!-- QUOTE -->
  <text x="32"  y="332" class="mono" font-size="10" fill="#7C3AED">›</text>
  <text x="44"  y="332" class="mono" font-size="10" fill="#7E6B9E">지식에 대한 갈망, 사람과의 만남을 통해 전략적인 결과물을 만듭니다</text>

  <!-- Divider 4 -->
  <rect x="32" y="346" width="736" height="1" fill="#4C1D95"/>

  <!-- BOTTOM -->
  <text x="400" y="369" class="mono" font-size="9" fill="#6D28D9" text-anchor="middle" letter-spacing="2">두 산업 동시에 굴리는 PM</text>
  <text x="400" y="390" class="mono" font-size="9" fill="#5B21B6" text-anchor="middle">[ AI ]  [ Enterprise ]  [ Chatbot ]  [ Agent ]  [ Voice ]  [ Blockchain ]  [ PM ]</text>
</svg>
