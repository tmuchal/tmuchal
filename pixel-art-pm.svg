  <rect x="178" y="151" width="182" height="14" fill="#6D28D9"/>
  <rect x="178" y="151" width="182" height="4"  fill="#A855F7" opacity="0.35"/>
  <text x="446" y="163" class="mono" font-size="10" fill="#8B5CF6">에이전트 굴리는 중</text>

