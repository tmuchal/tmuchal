  <text x="141" y="275" class="mono" font-size="9" fill="#C4B5FD" text-anchor="middle">OKR</text>
  <rect x="162" y="264" width="38" height="16" fill="#2D1B69"/>
  <text x="181" y="275" class="mono" font-size="9" fill="#C4B5FD" text-anchor="middle">Sprint</text>
  <rect x="206" y="264" width="62" height="16" fill="#2D1B69"/>
  <text x="237" y="275" class="mono" font-size="9" fill="#C4B5FD" text-anchor="middle">User Story</text>

