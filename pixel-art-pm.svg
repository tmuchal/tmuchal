<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A001A" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#0A001A" stop-opacity="0.88"/>
    </linearGradient>
    <style>
      .mono { font-family: 'Courier New', Courier, 'Malgun Gothic', 'Apple SD Gothic Neo', monospace; }
    </style>
  </defs>

  <!-- Background photo -->
  <image href="https://raw.githubusercontent.com/tmuchal/tmuchal/main/HA7UmbuaQAAFHJ_.jpg"
         x="0" y="0" width="800" height="420" preserveAspectRatio="xMidYMid slice"/>

  <!-- Dark overlay -->
  <rect width="800" height="420" fill="url(#overlay)"/>

  <!-- BORDER -->
  <rect x="16" y="16" width="768" height="388" fill="none" stroke="#7C3AED" stroke-width="3"/>
  <!-- corner accents -->
  <rect x="12" y="12" width="8" height="8" fill="#C084FC"/>
  <rect x="780" y="12" width="8" height="8" fill="#C084FC"/>
  <rect x="12" y="400" width="8" height="8" fill="#C084FC"/>
  <rect x="780" y="400" width="8" height="8" fill="#C084FC"/>

  <!-- HEADER -->
  <text x="32" y="52" class="mono" font-size="20" font-weight="bold" fill="#EDE9FE">▮ 우철 (uchal)</text>
  <rect x="32" y="60" width="152" height="19" fill="#3B1479"/>
  <text x="108" y="73" class="mono" font-size="11" fill="#C4B5FD" text-anchor="middle">대기업 AI Manager · PM</text>

  <!-- Divider 1 -->
  <rect x="32" y="92" width="736" height="1" fill="#6D28D9"/>

