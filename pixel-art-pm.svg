  <rect x="178" y="211" width="109" height="14" fill="#4C1D95"/>
  <rect x="178" y="211" width="109" height="4"  fill="#A855F7" opacity="0.35"/>
  <text x="446" y="223" class="mono" font-size="10" fill="#8B5CF6">별도 빌드업 중</text>

