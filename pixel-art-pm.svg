  <text x="32" y="193" class="mono" font-size="10" fill="#A78BFA">VOICE AI · LOUNGE</text>
  <rect x="178" y="181" width="260" height="14" fill="#1A0830"/>
  <rect x="178" y="181" width="145" height="14" fill="#5B21B6"/>
  <rect x="178" y="181" width="145" height="4"  fill="#A855F7" opacity="0.35"/>
